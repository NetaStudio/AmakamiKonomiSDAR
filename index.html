<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; background-color: #f0f0f0; }
        #ar-button {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; background-color: #fff; border-radius: 25px;
            border: 2px solid #ccc; font-weight: bold; z-index: 999;
        }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="konomi.glb"
    alt="SD甘狼このみ"
    ar
    ar-modes="webxr scene-viewer"
    camera-controls
    autoplay 
    animation-name="idle"
    shadow-intensity="1"
>
    <button slot="ar-button" id="ar-button">AR撮影</button>
</model-viewer>

<script>
    const viewer = document.querySelector('#character-viewer');
    
    const IDLE_ANIM = "idle";
    const REACTION_ANIMS = ["wave", "jump"];
    
    let currentTrackIndex = 0;
    let isReacting = false;

    // モーションを切り替える共通関数
    function triggerNextAnimation() {
        if (isReacting) return;
        
        isReacting = true;
        const chosenAnim = REACTION_ANIMS[currentTrackIndex];
        viewer.animationName = chosenAnim;

        // 次のモーション用にインデックスを進める
        currentTrackIndex = (currentTrackIndex + 1) % REACTION_ANIMS.length;

        // 2.5秒後に待機モーション(idle)に戻す
        setTimeout(() => {
            viewer.animationName = IDLE_ANIM;
            isReacting = false;
        }, 2500);
    }

    // ① 通常ブラウザ画面でのタップ判定
    viewer.addEventListener('click', (event) => {
        // AR起動ボタンを押したときは反応させない
        if (event.target.closest('#ar-button')) return;

        const hit = viewer.positionAndNormalAtPixel(event.clientX, event.clientY);
        if (hit) {
            triggerNextAnimation();
        }
    });

    // ② 【重要】Android WebXR（ARモード）空間内でのタップ判定
    viewer.addEventListener('ar-status', (event) => {
        // ARモードに入った瞬間を検知
        if (event.detail.status === 'session-started') {
            const xrSession = viewer.xrSession; // WebXRのセッションを取得
            
            if (xrSession) {
                // AR空間内で画面がタップ（セレクト）されたときのイベントを追加
                xrSession.addEventListener('select', () => {
                    // 移動操作と被って暴発するのを防ぐため、少しだけ遅らせて実行、またはそのまま実行
                    triggerNextAnimation();
                });
            }
        }
    });
</script>

</body>
</html>
