<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        model-viewer { width: 100vw; height: 100vh; background-color: #f0f0f0; }
        #ar-button {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; background-color: #fff; border-radius: 25px;
            border: 2px solid #ccc; font-weight: bold; z-index: 999;
        }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="konomi.glb"
    ios-src="konomi.usdz"
    alt="SD甘狼このみ"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    autoplay 
    animation-name="idle"
    shadow-intensity="1"
>
    <button slot="ar-button" id="ar-button">AR撮影</button>
</model-viewer>

<script>
    const viewer = document.querySelector('#character-viewer');
    
    // 通常時の待機モーション
    const IDLE_ANIM = "idle";
    
    // タップしたときに「順番に」流したいモーションのリスト
    const REACTION_ANIMS = [
        "wave",    // 1回目のタップ：手を振る
        "jump"     // 2回目のタップ：跳ねる
    ];
    
    let currentTrackIndex = 0; // 次に再生するモーションの番号
    let isReacting = false;     // 現在モーション再生中かどうかのフラグ

    viewer.addEventListener('click', (event) => {
        // モーション再生中なら、タップされても何もせず処理を終了
        if(isReacting) return;

        // モデルがタップされたか判定
        const hit = viewer.positionAndNormalAtPixel(event.clientX, event.clientY);
        
        if(hit) {
            isReacting = true;

            const chosenAnim = REACTION_ANIMS[currentTrackIndex];
            viewer.animationName = chosenAnim;

            currentTrackIndex = (currentTrackIndex + 1) % REACTION_ANIMS.length;

            setTimeout(() => {
                viewer.animationName = IDLE_ANIM;
                isReacting = false;
            }, 2500); 
        }
    });
</script>

</body>
</html>
