<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            user-select: none;
        }
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #f0f0f0; 
        }

        /* ─── 【仕様1】AR撮影モード前のUI ─── */
        #ar-button {
            position: absolute; 
            top: 20px;          
            left: 20px;         
            padding: 14px 28px; 
            background-color: #fff; 
            border-radius: 25px;
            border: 2px solid #ccc; 
            font-weight: bold; 
            font-size: 16px;
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* ─── 【仕様2,3,4】AR撮影モード（カメラ起動中）専用のUIレイヤー ─── */
        /* model-viewerの直下（中身）に配置し、WebXRのDOM Overlayとして登録します */
        #ar-camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 通常時は下のモデル操作を邪魔しない */
            display: none; /* AR起動前は非表示 */
        }

        /* 4秒無操作でフェードアウトするためのボタン共通スタイル */
        .ar-camera-ui {
            position: absolute;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: opacity 0.4s ease, transform 0.4s ease;
            opacity: 0;
            pointer-events: none; /* 消えている時はタップを無効化 */
        }

        /* 画面操作があった時に現れるクラス */
        .ar-camera-ui.active {
            opacity: 1;
            pointer-events: auto; /* 現れている時だけタップ可能 */
        }

        /* 【仕様3】画面左下の「ポーズ切り替え」ボタン */
        #pose-btn {
            bottom: 40px;
            left: 30px;
            padding: 15px 25px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            font-size: 15px;
        }

        /* 【仕様2】画面真ん中下の「撮影（シャッター）」ボタン */
        #shutter-btn {
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background-color: #fff;
            border: 5px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%; /* 完全な丸 */
            color: #333;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pose-btn:active { background-color: rgba(0,0,0,1); }
        #shutter-btn:active { background-color: #ddd; transform: translateX(-50%) scale(0.95); }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="./konomi.glb"
    ios-src="./konomi.usdz" 
    alt="SD甘狼このみ"
    ar
    ar-modes="webxr" 
    camera-controls
    autoplay
    shadow-intensity="1"
>
    <button slot="ar-button" id="ar-button">AR撮影</button>

    <div id="ar-camera-overlay">
        <button id="pose-btn" class="ar-camera-ui">ポーズ切り替え</button>

        <button id="shutter-btn" class="ar-camera-ui">📸</button>
    </div>
</model-viewer>


<script>
    const viewer = document.querySelector('#character-viewer');
    const overlayUI = document.querySelector('#ar-camera-overlay');
    const poseBtn = document.querySelector('#pose-btn');
    const shutterBtn = document.querySelector('#shutter-btn');
    
    let realIdleName = "";
    let realReactionAnims = [];
    let currentTrackIndex = 0; 
    let isReacting = false;     
    let uiTimer = null; 

    // 3Dモデル読み込み完了時の自動モーション解析
    viewer.addEventListener('load', () => {
        const available = viewer.availableAnimations;
        const idleTrack = available.find(name => name.toLowerCase().includes('idle'));
        realIdleName = idleTrack || available[0];
        realReactionAnims = available.filter(name => name !== realIdleName);

        if (realIdleName) {
            viewer.animationName = realIdleName;
            viewer.play();
        }
    });

    // モーション切り替え
    function triggerNextAnimation() {
        if (realReactionAnims.length === 0 || isReacting) return; 
        isReacting = true; 

        const chosenAnim = realReactionAnims[currentTrackIndex];
        viewer.animationName = chosenAnim;
        viewer.play();

        currentTrackIndex = (currentTrackIndex + 1) % realReactionAnims.length;

        setTimeout(() => {
            if (realIdleName) {
                viewer.animationName = realIdleName;
                viewer.play();
            }
            isReacting = false; 
        }, 2500);
    }

    // ─── 【仕様4】UIフェードイン・4秒無操作フェードアウト ───
    function wakeUpUI() {
        if (uiTimer) clearTimeout(uiTimer);

        poseBtn.classList.add('active');
        shutterBtn.classList.add('active');

        // 4秒間、次の操作がなければ自動でフェードアウト（透明化）
        uiTimer = setTimeout(() => {
            fadeOutUI();
        }, 4000);
    }

    function fadeOutUI() {
        poseBtn.classList.remove('active');
        shutterBtn.classList.remove('active');
    }

    // ─── WebXR（ARカメラ画面）への正式なUI重ね合わせ処理 ───
    viewer.addEventListener('ar-status', (event) => {
        if (event.detail.status === 'session-started') {
            // ARカメラが起動したら、重ね合わせるUIを有効化
            overlayUI.style.display = 'block';
            wakeUpUI();

            // ARのシステム（WebXR）がタッチイベントを拾ったときの処理を登録
            const xrSession = viewer.xrSession;
            if (xrSession) {
                // AR画面のどこかをタッチ（モデルの移動や画面操作）したら、UIが自動で現れる（仕様4）
                xrSession.addEventListener('selectstart', () => {
                    wakeUpUI();
                });
            }
        } else if (event.detail.status === 'session-ended') {
            // ARを終了したらUIを隠す
            overlayUI.style.display = 'none';
            fadeOutUI();
        }
    });

    // ─── ボタンのタッチ処理（イベントの突き抜けによる移動枠の暴発を完璧に防御） ───

    // 左下：ポーズ切り替え
    poseBtn.addEventListener('touchstart', (event) => {
        event.stopPropagation(); // 3D空間へのタップ貫通を防ぎ、足元のリングを出さない
        triggerNextAnimation();
        wakeUpUI(); // タイマー延長
    }, { passive: true });

    // 真ん中下：撮影ボタン（UIを完全に消して高画質スクショを自動保存）
    async function executeCaptureSequence() {
        // 1. UIをその瞬間に即時非表示（透明）にする
        fadeOutUI();
        if (uiTimer) clearTimeout(uiTimer);

        // 2. UIが消えるアニメーションをわずかに待つ（0.2秒）
        await new Promise(resolve => setTimeout(resolve, 200));

        try {
            // 3. UIが一切写っていない、最高の綺麗なAR画像を切り出し（撮影）
            const blob = await viewer.toBlob({ idealAspect: true });
            const url = URL.createObjectURL(blob);
            
            // 4. スマホへの自動保存（ダウンロード）処理
            const a = document.createElement('a');
            a.href = url;
            a.download = `konomi_AR_${new Date().getTime()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } catch (err) {
            console.error("撮影に失敗しました:", err);
        }

        // 5. 撮影完了後、自動的にUIを画面に復帰させる
        wakeUpUI();
    }

    shutterBtn.addEventListener('touchstart', (event) => {
        event.stopPropagation(); // 3D空間への貫通を防ぎ、足元のリングを出さない
        executeCaptureSequence();
    }, { passive: true });
</script>

</body>
</html>
