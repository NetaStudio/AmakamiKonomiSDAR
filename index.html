<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <!-- スマホの画面幅に合わせて自動調整 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            user-select: none;
        }
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #f0f0f0; 
        }

        #ar-button {
            position: absolute; 
            top: 20px;          
            left: 20px;         
            padding: 14px 28px; 
            background-color: #fff; 
            border-radius: 25px;
            border: 2px solid #ccc; 
            font-weight: bold; 
            font-size: 16px;
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* 通常画面用のプルダウンメニュー */
        #model-select-container {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 999;
        }

        #model-select {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border: 2px solid #ccc;
            border-radius: 20px;
            background-color: #fff;
            color: #333;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            outline: none;
        }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="./konomi_01.glb"
    ios-src="./konomi_01.usdz" 
    alt="SD甘狼このみ"
    ar
    ar-modes="scene-viewer" 
    camera-controls
    autoplay
    tone-mapping="none"
    exposure="1.5"
    shadow-intensity="1"
>
    <button slot="ar-button" id="ar-button">AR撮影</button>
</model-viewer>

<!-- ポーズを切り替えるプルダウンメニュー -->
<div id="model-select-container">
    <select id="model-select">
        <option value="0">立ち</option>
        <option value="1">ガオー</option>
        <option value="2">抱っこ</option>
        <option value="3">お座り</option>
        <option value="4">ダンス</option>
    </select>
</div>


<script>
    //HTML内の特定の要素をプログラムから触れるように取得
    const viewer = document.querySelector('#character-viewer');
    const modelSelect = document.querySelector('#model-select');
    //ポーズ５種類
    const modelData = [
        { name: "立ち", glb: "./konomi_01.glb", usdz: "./konomi_01.usdz" },
        { name: "ガオー", glb: "./konomi_02.glb", usdz: "./konomi_02.usdz" },
        { name: "抱っこ", glb: "./konomi_03.glb", usdz: "./konomi_03.usdz" },
        { name: "お座り", glb: "./konomi_04.glb", usdz: "./konomi_04.usdz" },
        { name: "ダンス", glb: "./konomi_05.glb", usdz: "./konomi_05.usdz" }
    ];

    //選択されたポーズに応じて、表示する3Dモデルのファイルを切り替える
    function changeModel(index) {
        const model = modelData[index];
        viewer.src = model.glb;
        viewer.iosSrc = model.usdz;
    }

    //3Dモデルファイルがブラウザ上に新しく読み込み完了したときに実行
    viewer.addEventListener('load', () => {
        viewer.animationName = available[0];
        //アニメーションの再生を開始
        viewer.play();
    });

    //ユーザーがプルダウンメニューの選択を変更したときに実行
    modelSelect.addEventListener('change', (event) => {
        const index = parseInt(event.target.value, 10);
        //変換した番号を使い、上で作ったモデル切り替えて実行
        changeModel(index);
    });
</script>

</body>
</html>
