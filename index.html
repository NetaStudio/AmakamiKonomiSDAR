<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
        }
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #f0f0f0; 
        }
        
        /* AR起動前・撮影中 共通の左上「AR撮影」ボタン */
        #ar-button {
            position: absolute; 
            top: 20px;          
            left: 20px;         
            padding: 12px 24px; 
            background-color: #fff; 
            border-radius: 25px;
            border: 2px solid #ccc; 
            font-weight: bold; 
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 【重要】AR撮影中（カメラ画面）でも絶対に消えない右下「ポーズ切り替え」ボタン */
        #action-button {
            position: absolute;
            bottom: 30px;
            right: 20px;
            padding: 14px 24px;
            background-color: rgba(0, 0, 0, 0.75); /* AR画面で見やすいように暗めの半透明 */
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            font-weight: bold;
            font-size: 15px;
            z-index: 9999;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: block; /* 常に表示 */
        }
        #action-button:active {
            background-color: rgba(0, 0, 0, 0.9);
        }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="./konomi.glb"
    ios-src="./konomi.usdz" 
    alt="SD甘狼このみ"
    ar
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls
    autoplay
    shadow-intensity="1"
>
    <button slot="ar-button" id="ar-button">AR撮影</button>

    <button slot="hotspot-action-btn" id="action-button">ポーズ切り替え</button>
</model-viewer>

<script>
    const viewer = document.querySelector('#character-viewer');
    const actionBtn = document.querySelector('#action-button');
    
    let realIdleName = "";
    let realReactionAnims = [];
    let currentTrackIndex = 0; 
    let isReacting = false;     

    // 3Dモデル読み込み完了時にアニメーションを自動解析
    viewer.addEventListener('load', () => {
        const available = viewer.availableAnimations;
        console.log("見つかった全アニメーション名:", available);

        // idleが含まれるものを待機モーションに
        const idleTrack = available.find(name => name.toLowerCase().includes('idle'));
        realIdleName = idleTrack || available[0];

        // idle以外のすべてのモーションをリアクション（wave, jump等）に
        realReactionAnims = available.filter(name => name !== realIdleName);

        if (realIdleName) {
            viewer.animationName = realIdleName;
            viewer.play();
        }
    });

    // モーション切り替えのコア処理
    function triggerNextAnimation() {
        if (realReactionAnims.length === 0 || isReacting) return; 
        
        isReacting = true; 

        const chosenAnim = realReactionAnims[currentTrackIndex];
        console.log("★AR画面からモーション切り替えを実行:", chosenAnim);
        
        viewer.animationName = chosenAnim;
        viewer.play();

        // 次のタップ用にインデックスを進める
        currentTrackIndex = (currentTrackIndex + 1) % realReactionAnims.length;

        // 2.5秒後に自動的に最初の待機モーション(idle)に戻す
        setTimeout(() => {
            if (realIdleName) {
                viewer.animationName = realIdleName;
                viewer.play();
            }
            isReacting = false; 
        }, 2500);
    }

    // AR撮影中（カメラ起動中）のボタンタップを確実に奪取する設定
    // ※タッチの瞬間に判定を奪い、背後の3D空間（移動枠を出すシステム）への突き抜けを完全に防御します
    actionBtn.addEventListener('touchstart', (event) => {
        event.stopPropagation();
        triggerNextAnimation();
    }, { passive: true });

    // 通常のPCブラウザ等でのテスト用クリックイベント
    actionBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        triggerNextAnimation();
    });
</script>

</body>
</html>
