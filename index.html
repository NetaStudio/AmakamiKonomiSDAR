<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            user-select: none;
        }
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #f0f0f0; 
        }

        /* ─── 【仕様1】AR撮影モード前のUI ─── */
        #ar-button {
            position: absolute; 
            top: 20px;          
            left: 20px;         
            padding: 14px 28px; 
            background-color: #fff; 
            border-radius: 25px;
            border: 2px solid #ccc; 
            font-weight: bold; 
            font-size: 16px;
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* ─── 【仕様2,3,4】AR撮影モード（カメラ起動中）専用のUIレイヤー ─── */
        #ar-camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* AR起動前は非表示 */
            z-index: 10;
            pointer-events: none; /* コンテナ自体はタッチをスルー（右上✕ボタンの邪魔をしない） */
        }

        /* 4秒無操作でフェードアウトするためのボタン共通スタイル */
        .ar-camera-ui {
            position: absolute;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
            opacity: 0;
            visibility: hidden;
            pointer-events: auto; /* ボタン自体は個別にタップを有効化 */
        }

        /* 画面操作があった時に現れるクラス */
        .ar-camera-ui.active {
            opacity: 1;
            visibility: visible;
        }

        /* 【仕様3】画面左下の「ポーズ切り替え」ボタン */
        #pose-btn {
            bottom: 40px;
            left: 30px;
            padding: 15px 25px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            font-size: 15px;
        }

        /* 【仕様2】画面真ん中下の「撮影（シャッター）」ボタン */
        #shutter-btn {
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background-color: #fff;
            border: 5px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%; /* 完全な丸 */
            color: #333;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pose-btn:active { background-color: rgba(0,0,0,1); }
        #shutter-btn:active { background-color: #ddd; transform: translateX(-50%) scale(0.95); }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="./konomi.glb"
    ios-src="./konomi.usdz" 
    alt="SD甘狼このみ"
    ar
    ar-modes="webxr" 
    camera-controls
    autoplay
    shadow-intensity="1"
    preserve-drawing-buffer
>
    <button slot="ar-button" id="ar-button">AR撮影</button>

    <div id="ar-camera-overlay">
        <button id="pose-btn" class="ar-camera-ui">ポーズ切り替え</button>

        <button id="shutter-btn" class="ar-camera-ui">📸</button>
    </div>
</model-viewer>


<script>
    const viewer = document.querySelector('#character-viewer');
    const overlayUI = document.querySelector('#ar-camera-overlay');
    const poseBtn = document.querySelector('#pose-btn');
    const shutterBtn = document.querySelector('#shutter-btn');
    
    let realIdleName = "";
    let realReactionAnims = [];
    let currentTrackIndex = 0; 
    let isReacting = false;     
    let uiTimer = null; 
    let isCapturing = false; // 撮影中連打防止フラグ

    // モデル読み込み完了時のアニメーション解析
    viewer.addEventListener('load', () => {
        const available = viewer.availableAnimations;
        const idleTrack = available.find(name => name.toLowerCase().includes('idle'));
        realIdleName = idleTrack || available[0];
        realReactionAnims = available.filter(name => name !== realIdleName);

        if (realIdleName) {
            viewer.animationName = realIdleName;
            viewer.play();
        }
    });

    // モーション切り替え
    function triggerNextAnimation() {
        if (realReactionAnims.length === 0 || isReacting) return; 
        isReacting = true; 

        const chosenAnim = realReactionAnims[currentTrackIndex];
        viewer.animationName = chosenAnim;
        viewer.play();

        currentTrackIndex = (currentTrackIndex + 1) % realReactionAnims.length;

        setTimeout(() => {
            if (realIdleName) {
                viewer.animationName = realIdleName;
                viewer.play();
            }
            isReacting = false; 
        }, 2500);
    }

    // ─── 【仕様4】UIフェードイン・4秒無操作フェードアウト ───
    function wakeUpUI() {
        // 撮影シークエンスの最中だけはタイマー起動を一時ブロック
        if (isCapturing) return;

        if (uiTimer) clearTimeout(uiTimer);

        poseBtn.classList.add('active');
        shutterBtn.classList.add('active');

        // 4秒間、何も操作がなければ自動フェードアウト
        uiTimer = setTimeout(() => {
            fadeOutUI();
        }, 4000);
    }

    function fadeOutUI() {
        poseBtn.classList.remove('active');
        shutterBtn.classList.remove('active');
    }

    // ARカメラ起動時の状態変化
    viewer.addEventListener('ar-status', (event) => {
        if (event.detail.status === 'session-started') {
            overlayUI.style.display = 'block';
            wakeUpUI();
        } else if (event.detail.status === 'session-ended') {
            overlayUI.style.display = 'none';
            fadeOutUI();
        }
    });

    // ─── 【仕様4】画面操作（タップやスワイプ）でUIを確実に復活させる ───
    
    // 画面に指が触れた瞬間（タップ）
    window.addEventListener('touchstart', (event) => {
        // 右上の「✕」ボタン周辺のタップ時はUI起動をスルーさせて終了を最優先する
        if (event.touches[0].clientX > window.innerWidth * 0.8 && event.touches[0].clientY < 60) {
            return; 
        }
        wakeUpUI();
    }, { passive: true });

    // 画面上で指を動かしたとき（モデルの操作など）
    window.addEventListener('touchmove', () => {
        wakeUpUI();
    }, { passive: true });


    // ─── ボタン単体のタッチ処理（イベントの貫通・暴発を100%ガード。passive: falseで徹底防御） ───

    // 左下：ポーズ切り替え
    poseBtn.addEventListener('touchstart', (event) => {
        event.preventDefault();
        event.stopPropagation(); // 3D空間への貫通を完全に阻止（足元のリングを出さない）
        triggerNextAnimation();
        wakeUpUI(); // タイマー延長
    }, { passive: false });

    // 【仕様2】真ん中下：高速撮影＆UI自動復帰シークエンス
    async function executeCaptureSequence() {
        if (isCapturing) return;
        isCapturing = true;

        // 1. UIをその瞬間に即時非表示（透明）にする
        fadeOutUI();
        if (uiTimer) clearTimeout(uiTimer);

        // 2. 画面上のUIが消えるのをほんのわずかに待つ（0.15秒）
        await new Promise(resolve => setTimeout(resolve, 150));

        try {
            // 3. preserve-drawing-bufferの恩恵により、モデルがバッチリ写ったBlobをバックグラウンド生成
            const blob = await viewer.toBlob({ idealAspect: true, mimeType: 'image/png' });
            const url = URL.createObjectURL(blob);
            
            // 4. サイレント自動ダウンロード（Androidの画面をササッと通過させます）
            const a = document.createElement('a');
            a.href = url;
            a.download = `konomi_AR_${new Date().getTime()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } catch (err) {
            console.error("撮影に失敗しました:", err);
        }

        // 5. ダウンロード命令が走ったら、ユーザーを待たせることなく即座にUIを画面に復帰
        isCapturing = false;
        wakeUpUI();
    }

    shutterBtn.addEventListener('touchstart', (event) => {
        event.preventDefault();
        event.stopPropagation(); // 3D空間への貫通を阻止（足元のリングを出さない）
        executeCaptureSequence();
    }, { passive: false });
</script>

</body>
</html>
