<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            user-select: none;
        }
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #f0f0f0; 
        }
        
        /* 基本スタイル：ボタンは最初から表示 */
        .ar-ui-btn {
            position: absolute;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            z-index: 9999;
            /* 画面外へスライドして消えるアニメーション設定 */
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s;
            opacity: 1;
        }

        /* 【左下】ポーズ切り替えボタン */
        #action-button {
            bottom: 40px;
            left: 20px;
            padding: 14px 24px;
            background-color: rgba(0, 0, 0, 0.75);
            color: #fff;
            font-size: 15px;
            transform: translateY(0);
        }

        /* 【右下】UIを画面外に格納するボタン */
        #hide-button {
            bottom: 40px;
            right: 20px;
            padding: 14px 24px;
            background-color: #fff;
            color: #333;
            font-size: 15px;
            transform: translateY(0);
        }

        /* ─── 録画モード（UI格納時）のスタイル ─── */
        /* ボタンを画面の下側の外（見えない場所）へ完全にスライド退避させる */
        .ar-ui-btn.is-hidden {
            transform: translateY(120px) !important;
            opacity: 0;
            pointer-events: none;
        }

        /* 【新設：復活トリガー】UIが消えている間、画面最上部に配置される「見えない細い帯」 */
        /* ここを直接タップすることで、モデルの移動枠（リング）を暴発させずにUIを復活させます */
        #ui-reviver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 50px; /* 上部の50ピクセル分だけのタッチエリア */
            background-color: rgba(0, 0, 0, 0.01); /* ほぼ完全な透明（0にするとタップが反応しないため0.01） */
            z-index: 99999;
            display: none; /* 通常時は非表示 */
            cursor: pointer;
        }

        /* 左上：AR起動ボタン（AR起動前のみ使用） */
        #ar-button {
            position: absolute; 
            top: 20px;          
            left: 20px;         
            padding: 12px 24px; 
            background-color: #fff; 
            border-radius: 25px;
            border: 2px solid #ccc; 
            font-weight: bold; 
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        #action-button:active { background-color: rgba(0,0,0,0.9); }
        #hide-button:active { background-color: #ddd; }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="./konomi.glb"
    ios-src="./konomi.usdz" 
    alt="SD甘狼このみ"
    ar
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls
    autoplay
    shadow-intensity="1"
>
    <button slot="ar-button" id="ar-button">AR撮影</button>

    <button slot="hotspot-action" id="action-button" class="ar-ui-btn">ポーズ切り替え</button>

    <button slot="hotspot-hide" id="hide-button" class="ar-ui-btn">👁 ボタンを隠す</button>

    <div slot="hotspot-reviver" id="ui-reviver"></div>
</model-viewer>

<script>
    const viewer = document.querySelector('#character-viewer');
    const actionBtn = document.querySelector('#action-button');
    const hideBtn = document.querySelector('#hide-button');
    const reviverZone = document.querySelector('#ui-reviver');
    
    let realIdleName = "";
    let realReactionAnims = [];
    let currentTrackIndex = 0; 
    let isReacting = false;     

    // 3Dモデル読み込み完了時の自動解析
    viewer.addEventListener('load', () => {
        const available = viewer.availableAnimations;
        const idleTrack = available.find(name => name.toLowerCase().includes('idle'));
        realIdleName = idleTrack || available[0];
        realReactionAnims = available.filter(name => name !== realIdleName);

        if (realIdleName) {
            viewer.animationName = realIdleName;
            viewer.play();
        }
    });

    // モーション切り替えの処理
    function triggerNextAnimation() {
        if (realReactionAnims.length === 0 || isReacting) return; 
        isReacting = true; 

        const chosenAnim = realReactionAnims[currentTrackIndex];
        viewer.animationName = chosenAnim;
        viewer.play();

        currentTrackIndex = (currentTrackIndex + 1) % realReactionAnims.length;

        setTimeout(() => {
            if (realIdleName) {
                viewer.animationName = realIdleName;
                viewer.play();
            }
            isReacting = false; 
        }, 2500);
    }

    // ─── UIを完全に隠す（画面外へスライド退避） ───
    function hideAllUI() {
        actionBtn.classList.add('is-hidden');
        hideBtn.classList.add('is-hidden');
        // ボタンが完全に隠れたら、上部の透明な「復活エリア」を有効化する
        reviverZone.style.display = 'block';
    }

    // ─── UIを画面内に戻す ───
    function showAllUI() {
        actionBtn.classList.remove('is-hidden');
        hideBtn.classList.remove('is-hidden');
        // UIが戻ったら、復活エリアは片付ける
        reviverZone.style.display = 'none';
    }

    // ─── ボタンのタッチ処理（イベントの突き抜けを完全に防御 ➔ 移動枠の暴発ゼロ） ───

    // 左下：ポーズ切り替え
    actionBtn.addEventListener('touchstart', (event) => {
        event.stopPropagation(); // 3D空間への貫通をガード
        triggerNextAnimation();
    }, { passive: true });
    actionBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        triggerNextAnimation();
    });

    // 右下：UIを隠す
    hideBtn.addEventListener('touchstart', (event) => {
        event.stopPropagation(); // 3D空間への貫通をガード
        hideAllUI();
    }, { passive: true });
    hideBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        hideAllUI();
    });

    // 【最重要】画面最上部の透明な帯（復活エリア）がタップされた時
    // 直接HTML要素を叩くため、WebXRの移動枠（サークル）を一切暴発させずにUIを復帰可能！
    reviverZone.addEventListener('touchstart', (event) => {
        event.stopPropagation(); // 3D空間への貫通をガード（移動枠を絶対に出さない）
        showAllUI();
    }, { passive: true });
    reviverZone.addEventListener('click', (event) => {
        event.stopPropagation();
        showAllUI();
    });
</script>

</body>
</html>
