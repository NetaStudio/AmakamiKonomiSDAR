<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
        }
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #f0f0f0; 
        }
        
        /* AR撮影ボタンを左上に固定 */
        #ar-button {
            position: absolute; 
            top: 20px;          
            left: 20px;         
            padding: 12px 24px; 
            background-color: #fff; 
            border-radius: 25px;
            border: 2px solid #ccc; 
            font-weight: bold; 
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        #ar-button:active {
            background-color: #eee;
        }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="./konomi.glb"
    ios-src="./konomi.usdz" 
    alt="SD甘狼このみ"
    ar
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls
    autoplay
    shadow-intensity="1"
>
    <button slot="ar-button" id="ar-button">AR撮影</button>
</model-viewer>

<script>
    const viewer = document.querySelector('#character-viewer');
    
    let realIdleName = "";
    let realReactionAnims = [];
    let currentTrackIndex = 0; 
    let isReacting = false;     

    // 3Dモデルが読み込まれたら実行
    viewer.addEventListener('load', () => {
        const available = viewer.availableAnimations;
        console.log("見つかった全アニメーション名:", available);

        // 1. 文字列に「idle」が含まれるものを待機モーションに決定
        const idleTrack = available.find(name => name.toLowerCase().includes('idle'));
        realIdleName = idleTrack || available[0]; // 万が一見つからなければ0番目

        // 2. 【超重要】「idleではない、残りのすべてのモーション」を無条件でリアクションリストに入れる
        realReactionAnims = available.filter(name => name !== realIdleName);
        console.log("登録されたリアクション一覧:", realReactionAnims);

        // 初期モーションとして idle をループ再生
        if (realIdleName) {
            viewer.animationName = realIdleName;
            viewer.play();
        }
    });

    // モーションを順番に切り替える処理
    function triggerNextAnimation() {
        // リアクション用のモーションがファイル内に存在しなければ処理しない
        if (realReactionAnims.length === 0 || isReacting) return; 
        
        isReacting = true; 

        // リストの中から順番にアクションを選択して強制再生
        const chosenAnim = realReactionAnims[currentTrackIndex];
        console.log("★アニメーション移行を実行:", chosenAnim);
        
        viewer.animationName = chosenAnim;
        viewer.play();

        // 次回タップ用にインデックスを進める
        currentTrackIndex = (currentTrackIndex + 1) % realReactionAnims.length;

        // 2.5秒後に自動的に最初の待機モーション(idle)に戻す
        setTimeout(() => {
            if (realIdleName) {
                viewer.animationName = realIdleName;
                viewer.play();
            }
            isReacting = false; 
        }, 2500);
    }

    // ① 通常ブラウザ画面（Web画面）でのキャラタップ判定
    viewer.addEventListener('click', (event) => {
        if (event.target.closest('#ar-button')) return;
        const hit = viewer.positionAndNormalAtPixel(event.clientX, event.clientY);
        if (hit) {
            triggerNextAnimation();
        }
    });

    // ② Android WebXR（ARカメラ起動中）空間内でのタップ判定
    viewer.addEventListener('ar-status', (event) => {
        if (event.detail.status === 'session-started') {
            const xrSession = viewer.xrSession; 
            if (xrSession) {
                xrSession.addEventListener('select', () => {
                    triggerNextAnimation();
                });
            }
        }
    });
</script>

</body>
</html>
