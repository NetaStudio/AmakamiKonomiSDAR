<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            user-select: none;
        }
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #f0f0f0; 
        }

        #ar-button {
            position: absolute; 
            top: 20px;          
            left: 20px;         
            padding: 14px 28px; 
            background-color: #fff; 
            border-radius: 25px;
            border: 2px solid #ccc; 
            font-weight: bold; 
            font-size: 16px;
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* ─── プルダウン式モデル選択UI（左下配置） ─── */
        #model-select-container {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 999;
        }

        #model-select {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border: 2px solid #ccc;
            border-radius: 20px;
            background-color: #fff;
            color: #333;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            outline: none;
        }

        /* ─── WebXR（Android専用）カメラ起動中のUIレイヤー ─── */
        #ar-camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; 
            z-index: 10;
            pointer-events: none; 
        }

        .ar-camera-ui {
            position: absolute;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
            opacity: 0;
            visibility: hidden;
            pointer-events: auto; 
        }

        .ar-camera-ui.active {
            opacity: 1;
            visibility: visible;
        }

        /* 左下：アニメーション切り替え（AR起動時用） */
        #pose-btn {
            bottom: 40px;
            left: 30px;
            padding: 15px 25px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            font-size: 15px;
        }

        /* 真ん中下：UI消去用シャッター */
        #shutter-btn {
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background-color: #fff;
            border: 5px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            color: #333;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pose-btn:active { background-color: rgba(0,0,0,1); }
        #shutter-btn:active { background-color: #ddd; transform: translateX(-50%) scale(0.95); }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="./konomi_01.glb"
    ios-src="./konomi_01.usdz" 
    alt="SD甘狼このみ"
    ar
    ar-modes="webxr" 
    camera-controls
    autoplay
    tone-mapping="none"
    exposure="1.0"
    shadow-intensity="1"
>
    <button slot="ar-button" id="ar-button">AR撮影</button>

    <div id="ar-camera-overlay">
        <button id="pose-btn" class="ar-camera-ui">アニメーション切り替え</button>
        <button id="shutter-btn" class="ar-camera-ui">📸</button>
    </div>
</model-viewer>

<div id="model-select-container">
    <select id="model-select">
        <option value="0">立ち</option>
        <option value="1">ガオー</option>
        <option value="2">モデル 3</option>
        <option value="3">モデル 4</option>
        <option value="4">踊り</option>
    </select>
</div>

<script>
    const viewer = document.querySelector('#character-viewer');
    const overlayUI = document.querySelector('#ar-camera-overlay');
    const poseBtn = document.querySelector('#pose-btn');
    const shutterBtn = document.querySelector('#shutter-btn');
    const modelSelectContainer = document.querySelector('#model-select-container');
    const modelSelect = document.querySelector('#model-select');
    
    let uiTimer = null; 
    let isManualHidden = false; 

    // ─── モデルデータの配列化（AR中のボタン連動用） ───
    const modelData = [
        { name: "立ち", glb: "./konomi_01.glb", usdz: "./konomi_01.usdz" },
        { name: "ガオー", glb: "./konomi_02.glb", usdz: "./konomi_02.usdz" },
        { name: "モデル 3", glb: "./konomi_03.glb", usdz: "./konomi_03.usdz" },
        { name: "モデル 4", glb: "./konomi_04.glb", usdz: "./konomi_04.usdz" },
        { name: "踊り", glb: "./konomi_05.glb", usdz: "./konomi_05.usdz" }
    ];
    let currentIndex = 0;

    // モデルを変更する共通関数
    function changeModel(index) {
        currentIndex = index;
        const model = modelData[currentIndex];
        
        viewer.src = model.glb;
        viewer.iosSrc = model.usdz;
        
        // プルダウンの選択状態も連動させる
        modelSelect.value = currentIndex;
        poseBtn.innerText = `再生中: ${model.name}`;
    }

    // 💡【追加】ファイルが読み込まれたら、そのファイルに仕込まれているアニメーションを自動再生する
    viewer.addEventListener('load', () => {
        const available = viewer.availableAnimations;
        if (available.length > 0) {
            // ファイル内の最初のアニメーションをセットして再生
            viewer.animationName = available[0];
            viewer.play();
        }
    });

    // プルダウン切り替え処理（通常画面用）
    modelSelect.addEventListener('change', (event) => {
        const index = parseInt(event.target.value, 10);
        changeModel(index);
    });

    // AR起動中の「アニメーション切り替え」ボタン処理（Android WebXR用）
    function triggerNextModel() {
        const nextIndex = (currentIndex + 1) % modelData.length;
        changeModel(nextIndex);
    }

    // ─── UI表示コントロール ───
    function wakeUpUI() {
        if (isManualHidden) return;

        if (uiTimer) clearTimeout(uiTimer);
        poseBtn.classList.add('active');
        shutterBtn.classList.add('active');

        uiTimer = setTimeout(() => {
            fadeOutUI();
        }, 4000);
    }

    function fadeOutUI() {
        poseBtn.classList.remove('active');
        shutterBtn.classList.remove('active');
    }

    // AR起動検知
    viewer.addEventListener('ar-status', (event) => {
        if (event.detail.status === 'session-started') {
            isManualHidden = false;
            overlayUI.style.display = 'block';
            modelSelectContainer.style.display = 'none'; 
            poseBtn.innerText = `再生中: ${modelData[currentIndex].name}`;
            wakeUpUI();
        } else if (event.detail.status === 'session-ended') {
            overlayUI.style.display = 'none';
            modelSelectContainer.style.display = 'block'; 
            fadeOutUI();
        }
    });

    // ─── 画面タッチ・スワイプ監視 ───
    window.addEventListener('touchstart', (event) => {
        if (isManualHidden) {
            isManualHidden = false;
            wakeUpUI();
            return;
        }
        if (event.touches[0].clientX > window.innerWidth * 0.8 && event.touches[0].clientY < 60) {
            return; 
        }
        wakeUpUI();
    }, { passive: true });

    window.addEventListener('touchmove', () => {
        wakeUpUI();
    }, { passive: true });

    // ─── ボタン単体のタッチ処理 ───
    poseBtn.addEventListener('touchstart', (event) => {
        event.preventDefault();
        event.stopPropagation(); 
        triggerNextModel(); // 次のファイルへ切り替え
        wakeUpUI(); 
    }, { passive: false });

    shutterBtn.addEventListener('touchstart', (event) => {
        event.preventDefault();
        event.stopPropagation(); 
        isManualHidden = true;
        fadeOutUI();
        if (uiTimer) clearTimeout(uiTimer);
    }, { passive: false });

</script>

</body>
</html>
