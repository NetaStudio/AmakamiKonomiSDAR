<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            user-select: none;
        }
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #f0f0f0; 
        }

        /* ─── 【ご希望】AR撮影モード前のUI ─── */
        /* AR撮影ボタンを左上だけに配置 */
        #ar-button {
            position: absolute; 
            top: 20px;          
            left: 20px;         
            padding: 14px 28px; 
            background-color: #fff; 
            border-radius: 25px;
            border: 2px solid #ccc; 
            font-weight: bold; 
            font-size: 16px;
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* ─── 【ご希望】AR撮影モード中のUI（画面固定・フェード対応） ─── */
        .ar-camera-ui {
            position: fixed; /* モデルの傍ではなく、画面に対して完全に固定配置 */
            font-weight: bold;
            cursor: pointer;
            z-index: 99999; /* WebXRの最前面に強制表示 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            /* ふわっとフェードアウト（4秒無操作時）するための設定 */
            transition: opacity 0.4s ease, transform 0.4s ease, visibility 0.4s;
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* UIが現れる時のクラス */
        .ar-camera-ui.active {
            opacity: 1;
            visibility: visible;
            pointer-events: auto;
        }

        /* 【ご希望】画面左下の「ポーズ切り替え」ボタン */
        #pose-btn {
            bottom: 40px;
            left: 30px;
            padding: 15px 25px;
            background-color: rgba(0, 0, 0, 0.75);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            font-size: 15px;
        }

        /* 【ご希望】画面真ん中下の「撮影（シャッター）」ボタン */
        #shutter-btn {
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%) translateY(0); /* 真ん中配置 */
            width: 75px;
            height: 75px;
            background-color: #fff;
            border: 5px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%; /* 完全な丸ボタン */
            color: #333;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 真ん中下のボタンが現れる時の位置補正 */
        #shutter-btn.active {
            transform: translateX(-50%) translateY(0) !important;
        }

        #pose-btn:active { background-color: rgba(0,0,0,0.9); }
        #shutter-btn:active { background-color: #ddd; transform: translateX(-50%) scale(0.95); }

        /* 【重要】移動枠を出さずにUIを出現させるための、画面全体の透明なタッチセンサーレイヤー */
        #ar-touch-sensor {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 9998; /* UIボタンのすぐ裏に配置 */
            background-color: rgba(0, 0, 0, 0.005); /* 完全に透明（タップを反応させるため極小の値を設定） */
            display: none; /* 通常時は非表示。ARモード中だけONになる */
        }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="./konomi.glb"
    ios-src="./konomi.usdz" 
    alt="SD甘狼このみ"
    ar
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls
    autoplay
    shadow-intensity="1"
>
    <button slot="ar-button" id="ar-button">AR撮影</button>
</model-viewer>

<div id="ar-touch-sensor"></div>

<button id="pose-btn" class="ar-camera-ui">ポーズ切り替え</button>

<button id="shutter-btn" class="ar-camera-ui">📸</button>


<script>
    const viewer = document.querySelector('#character-viewer');
    const poseBtn = document.querySelector('#pose-btn');
    const shutterBtn = document.querySelector('#shutter-btn');
    const touchSensor = document.querySelector('#ar-touch-sensor');
    
    let realIdleName = "";
    let realReactionAnims = [];
    let currentTrackIndex = 0; 
    let isReacting = false;     
    let uiTimer = null; // 4秒無操作タイマー用

    // 3Dモデル読み込み完了時の自動解析（Blenderの名前を自動判別）
    viewer.addEventListener('load', () => {
        const available = viewer.availableAnimations;
        const idleTrack = available.find(name => name.toLowerCase().includes('idle'));
        realIdleName = idleTrack || available[0];
        realReactionAnims = available.filter(name => name !== realIdleName);

        if (realIdleName) {
            viewer.animationName = realIdleName;
            viewer.play();
        }
    });

    // モーション切り替え
    function triggerNextAnimation() {
        if (realReactionAnims.length === 0 || isReacting) return; 
        isReacting = true; 

        const chosenAnim = realReactionAnims[currentTrackIndex];
        viewer.animationName = chosenAnim;
        viewer.play();

        currentTrackIndex = (currentTrackIndex + 1) % realReactionAnims.length;

        setTimeout(() => {
            if (realIdleName) {
                viewer.animationName = realIdleName;
                viewer.play();
            }
            isReacting = false; 
        }, 2500);
    }

    // ─── 【ご希望4】UIを表示・4秒無操作でフェードアウトさせる処理 ───
    
    function wakeUpUI() {
        // タイマーをリセット
        if (uiTimer) clearTimeout(uiTimer);

        // クラスを追加してUIをふわっと出現させる
        poseBtn.classList.add('active');
        shutterBtn.classList.add('active');

        // 4秒間無操作だったら自動でフェードアウト
        uiTimer = setTimeout(() => {
            fadeOutUI();
        }, 4000);
    }

    function fadeOutUI() {
        poseBtn.classList.remove('active');
        shutterBtn.classList.remove('active');
    }

    // ─── ARモード（カメラ起動）の状態変化をキャッチ ───
    viewer.addEventListener('ar-status', (event) => {
        if (event.detail.status === 'session-started') {
            // ARカメラが起動したら、透明なタッチセンサーを画面全体に被せる
            // これにより、画面を操作したときにモデルの移動枠（リング）が出るのを完全にガード！
            touchSensor.style.display = 'block';
            
            // 起動直後はUIを一度表示させる
            wakeUpUI();

            // WebXRのセッション内でもタッチを監視
            const xrSession = viewer.xrSession;
            if (xrSession) {
                xrSession.addEventListener('select', () => {
                    // 画面のどこかが操作されたらUIを起こす
                    wakeUpUI();
                });
            }
        } else if (event.detail.status === 'session-ended') {
            // ARが終わったらセンサーを消す
            touchSensor.style.display = 'none';
            fadeOutUI();
        }
    });

    // 【最重要】画面操作（透明レイヤーへのタッチ）が起きたらUIを出現させる
    // これにより、キャラを直接触らせないため移動枠が暴発しません
    touchSensor.addEventListener('touchstart', (event) => {
        event.stopPropagation();
        wakeUpUI();
    }, { passive: true });

    touchSensor.addEventListener('click', (event) => {
        event.stopPropagation();
        wakeUpUI();
    });

    // ─── ボタン単体の処理（移動枠の暴発・貫通を完全にガード） ───

    // 左下：ポーズ切り替え
    poseBtn.addEventListener('touchstart', (event) => {
        event.stopPropagation(); // 3D空間への貫通を絶対に防ぐ
        triggerNextAnimation();
        wakeUpUI(); // タイマー延長
    }, { passive: true });

    poseBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        triggerNextAnimation();
        wakeUpUI();
    });

    // 【ご希望2】真ん中下：撮影ボタン（UIを全て消してスクリーンショット）
    async function executeCaptureSequence() {
        // 1. まずUIを完全に即時フェードアウト（非表示）にする
        fadeOutUI();
        if (uiTimer) clearTimeout(uiTimer);

        // 2. UIが完全に消えるのをわずかに待つ（0.15秒）
        await new Promise(resolve => setTimeout(resolve, 1500));

        try {
            // 3. model-viewerの標準機能を使って、UIが一切ない高画質な写真を生成（スクショ撮影）
            const blob = await viewer.toBlob({ idealAspect: true });
            const url = URL.createObjectURL(blob);
            
            // 4. スマホ内に自動で保存（ダウンロード）させる処理
            const a = document.createElement('a');
            a.href = url;
            a.download = `konomi_AR_${new Date().getTime()}.png`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        } catch (err) {
            console.error("撮影に失敗しました:", err);
        }

        // 5. 撮影が終わったら自動的にUIを画面に戻す
        wakeUpUI();
    }

    shutterBtn.addEventListener('touchstart', (event) => {
        event.stopPropagation();
        executeCaptureSequence();
    }, { passive: true });

    shutterBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        executeCaptureSequence();
    });
</script>

</body>
</html>
