<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
        }
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #f0f0f0; 
        }
        
        /* AR撮影ボタン（左上） */
        #ar-button {
            position: absolute; 
            top: 20px;          
            left: 20px;         
            padding: 12px 24px; 
            background-color: #fff; 
            border-radius: 25px;
            border: 2px solid #ccc; 
            font-weight: bold; 
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 【新設】AR空間でも絶対に移動枠と被らない「アクションボタン」（右下） */
        #action-button {
            position: absolute;
            bottom: 30px;
            right: 20px;
            padding: 15px 28px;
            background-color: rgba(0, 0, 0, 0.7); /* 暗めの半透明でARでも見やすく */
            color: #fff;
            border: none;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            z-index: 9999; /* 最前面に配置 */
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        #action-button:active {
            background-color: rgba(0, 0, 0, 0.9);
        }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="./konomi.glb"
    ios-src="./konomi.usdz" 
    alt="SD甘狼このみ"
    ar
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls
    autoplay
    shadow-intensity="1"
>
    <button slot="ar-button" id="ar-button">AR撮影</button>
</model-viewer>

<button id="action-button">ポーズ切り替えポチッ</button>

<script>
    const viewer = document.querySelector('#character-viewer');
    const actionBtn = document.querySelector('#action-button');
    
    let realIdleName = "";
    let realReactionAnims = [];
    let currentTrackIndex = 0; 
    let isReacting = false;     

    // 3Dモデル読み込み完了時の自動解析
    viewer.addEventListener('load', () => {
        const available = viewer.availableAnimations;
        console.log("見つかった全アニメーション名:", available);

        // idleが含まれるものを待機モーションに
        const idleTrack = available.find(name => name.toLowerCase().includes('idle'));
        realIdleName = idleTrack || available[0];

        // idle以外のすべてのモーションをリアクションに
        realReactionAnims = available.filter(name => name !== realIdleName);

        if (realIdleName) {
            viewer.animationName = realIdleName;
            viewer.play();
        }
    });

    // モーション切り替えのコア処理
    function triggerNextAnimation() {
        if (realReactionAnims.length === 0 || isReacting) return; 
        
        isReacting = true; 

        const chosenAnim = realReactionAnims[currentTrackIndex];
        console.log("★ボタン経由でアニメーション移行を実行:", chosenAnim);
        
        viewer.animationName = chosenAnim;
        viewer.play();

        currentTrackIndex = (currentTrackIndex + 1) % realReactionAnims.length;

        // 2.5秒後に自動的に最初の待機モーション(idle)に戻す
        setTimeout(() => {
            if (realIdleName) {
                viewer.animationName = realIdleName;
                viewer.play();
            }
            isReacting = false; 
        }, 2500);
    }

    // 【最重要】キャラのタップではなく、画面右下のHTMLボタンのクリックで発火させる
    actionBtn.addEventListener('click', (event) => {
        event.stopPropagation(); // WebXR側のタッチイベントに伝播するのを完全に阻止
        triggerNextAnimation();
    });
</script>

</body>
</html>
