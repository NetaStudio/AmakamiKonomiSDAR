<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: sans-serif; }
        model-viewer { width: 100vw; height: 100vh; background-color: #f0f0f0; }
        #ar-button {
            position: absolute; top: 20px; left: 20px; padding: 12px 24px; 
            background-color: #fff; border-radius: 25px; border: 2px solid #ccc; 
            font-weight: bold; z-index: 999; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="./konomi.glb"
    ios-src="./konomi.usdz" 
    alt="SD甘狼このみ"
    ar
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls
    autoplay
    shadow-intensity="1"
>
    <button slot="ar-button" id="ar-button">AR撮影</button>
</model-viewer>

<script>
    const viewer = document.querySelector('#character-viewer');
    
    let animationsList = [];
    let currentTrackIndex = 0; 
    let isReacting = false;     

    // モデルが読み込まれたら中身のアニメーションを無条件で取得
    viewer.addEventListener('load', () => {
        animationsList = viewer.availableAnimations;
        console.log("読み込まれたアニメーション:", animationsList);
        
        // ファイル内にアニメーションが1つでもあれば、それを初期再生
        if (animationsList.length > 0) {
            viewer.animationName = animationsList[0];
            viewer.play();
        }
    });

    // モーションを強制的に切り替える処理
    function triggerNextAnimation() {
        // アニメーションがファイル内に2つ以上なければ切り替え処理をスキップ
        if (animationsList.length <= 1 || isReacting) return; 
        
        isReacting = true; 

        // 次のトラック番号に進める（登録されている数をループ）
        currentTrackIndex = (currentTrackIndex + 1) % animationsList.length;
        
        // 強制的にその番号のアニメーションを再生
        const chosenAnim = animationsList[currentTrackIndex];
        viewer.animationName = chosenAnim;
        viewer.play();

        // 2.5秒後に自動的に最初のモーション（通常はidle）に戻す
        setTimeout(() => {
            if (animationsList.length > 0) {
                viewer.animationName = animationsList[0];
                viewer.play();
            }
            isReacting = false; 
        }, 2500);
    }

    // ① 通常ブラウザ画面でのキャラタップ判定
    viewer.addEventListener('click', (event) => {
        if (event.target.closest('#ar-button')) return;
        const hit = viewer.positionAndNormalAtPixel(event.clientX, event.clientY);
        if (hit) { triggerNextAnimation(); }
    });

    // ② Android WebXR空間内でのタップ判定
    viewer.addEventListener('ar-status', (event) => {
        if (event.detail.status === 'session-started') {
            const xrSession = viewer.xrSession; 
            if (xrSession) {
                xrSession.addEventListener('select', () => { triggerNextAnimation(); });
            }
        }
    });
</script>

</body>
</html>
