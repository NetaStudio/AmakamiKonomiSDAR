<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            user-select: none;
        }
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #f0f0f0; 
        }

        #ar-button {
            position: absolute; 
            top: 20px;          
            left: 20px;         
            padding: 14px 28px; 
            background-color: #fff; 
            border-radius: 25px;
            border: 2px solid #ccc; 
            font-weight: bold; 
            font-size: 16px;
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* ─── 通常画面用のプルダウンメニュー ─── */
        #model-select-container {
            position: absolute;
            bottom: 30px;
            left: 20px;
            z-index: 999;
        }

        #model-select {
            padding: 12px 24px;
            font-size: 15px;
            font-weight: bold;
            border: 2px solid #ccc;
            border-radius: 20px;
            background-color: #fff;
            color: #333;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            outline: none;
        }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="./konomi_01.glb"
    ios-src="./konomi_01.usdz" 
    alt="SD甘狼このみ"
    ar
    ar-modes="scene-viewer" 
    camera-controls
    autoplay
    tone-mapping="none"
    exposure="2.0"
    shadow-intensity="1"
>
    <button slot="ar-button" id="ar-button">AR撮影</button>
</model-viewer>

<div id="model-select-container">
    <select id="model-select">
        <option value="0">立ち</option>
        <option value="1">ガオー</option>
        <option value="2">モデル 3</option>
        <option value="3">モデル 4</option>
        <option value="4">踊り</option>
    </select>
</div>

<script>
    const viewer = document.querySelector('#character-viewer');
    const modelSelect = document.querySelector('#model-select');
    
    const modelData = [
        { name: "立ち", glb: "./konomi_01.glb", usdz: "./konomi_01.usdz" },
        { name: "ガオー", glb: "./konomi_02.glb", usdz: "./konomi_02.usdz" },
        { name: "モデル 3", glb: "./konomi_03.glb", usdz: "./konomi_03.usdz" },
        { name: "モデル 4", glb: "./konomi_04.glb", usdz: "./konomi_04.usdz" },
        { name: "踊り", glb: "./konomi_05.glb", usdz: "./konomi_05.usdz" }
    ];

    function changeModel(index) {
        const model = modelData[index];
        viewer.src = model.glb;
        viewer.iosSrc = model.usdz;
    }

    viewer.addEventListener('load', () => {
        const available = viewer.availableAnimations;
        if (available.length > 0) {
            viewer.animationName = available[0];
            viewer.play();
        }
    });

    modelSelect.addEventListener('change', (event) => {
        const index = parseInt(event.target.value, 10);
        changeModel(index);
    });
</script>

</body>
</html>
