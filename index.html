<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            user-select: none;
        }
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #f0f0f0; 
        }

        #ar-button {
            position: absolute; 
            top: 20px;          
            left: 20px;         
            padding: 14px 28px; 
            background-color: #fff; 
            border-radius: 25px;
            border: 2px solid #ccc; 
            font-weight: bold; 
            font-size: 16px;
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        /* ─── WebXR（Android専用）カメラ起動中のUIレイヤー ─── */
        /* ※iOSはApple純正のARアプリが起動するため、このレイヤーは無視されApple標準のシャッターが使われます */
        #ar-camera-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; 
            z-index: 10;
            pointer-events: none; 
        }

        .ar-camera-ui {
            position: absolute;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
            opacity: 0;
            visibility: hidden;
            pointer-events: auto; 
        }

        .ar-camera-ui.active {
            opacity: 1;
            visibility: visible;
        }

        /* 左下：ポーズ切り替え */
        #pose-btn {
            bottom: 40px;
            left: 30px;
            padding: 15px 25px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            font-size: 15px;
        }

        /* 真ん中下：UI消去用シャッター（撮影準備ボタン） */
        #shutter-btn {
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            width: 75px;
            height: 75px;
            background-color: #fff;
            border: 5px solid rgba(0, 0, 0, 0.2);
            border-radius: 50%;
            color: #333;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #pose-btn:active { background-color: rgba(0,0,0,1); }
        #shutter-btn:active { background-color: #ddd; transform: translateX(-50%) scale(0.95); }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="./konomi.glb"
    ios-src="./konomi.usdz" 
    alt="SD甘狼このみ"
    ar
    ar-modes="webxr" 
    camera-controls
    autoplay
    shadow-intensity="1"
>
    <button slot="ar-button" id="ar-button">AR撮影</button>

    <div id="ar-camera-overlay">
        <button id="pose-btn" class="ar-camera-ui">ポーズ切り替え</button>
        <button id="shutter-btn" class="ar-camera-ui">📸</button>
    </div>
</model-viewer>


<script>
    const viewer = document.querySelector('#character-viewer');
    const overlayUI = document.querySelector('#ar-camera-overlay');
    const poseBtn = document.querySelector('#pose-btn');
    const shutterBtn = document.querySelector('#shutter-btn');
    
    let realIdleName = "";
    let realReactionAnims = [];
    let currentTrackIndex = 0; 
    let isReacting = false;     
    let uiTimer = null; 
    
    // 手動でUIを隠している状態を判定するフラグ
    let isManualHidden = false; 

    viewer.addEventListener('load', () => {
        const available = viewer.availableAnimations;
        const idleTrack = available.find(name => name.toLowerCase().includes('idle'));
        realIdleName = idleTrack || available[0];
        realReactionAnims = available.filter(name => name !== realIdleName);

        if (realIdleName) {
            viewer.animationName = realIdleName;
            viewer.play();
        }
    });

    function triggerNextAnimation() {
        if (realReactionAnims.length === 0 || isReacting) return; 
        isReacting = true; 

        const chosenAnim = realReactionAnims[currentTrackIndex];
        viewer.animationName = chosenAnim;
        viewer.play();

        currentTrackIndex = (currentTrackIndex + 1) % realReactionAnims.length;

        setTimeout(() => {
            if (realIdleName) {
                viewer.animationName = realIdleName;
                viewer.play();
            }
            isReacting = false; 
        }, 2500);
    }

    // ─── UI表示コントロール ───
    function wakeUpUI() {
        // シャッターボタンで手動で隠している間は、モデルを動かしてもUIを復活させない
        if (isManualHidden) return;

        if (uiTimer) clearTimeout(uiTimer);
        poseBtn.classList.add('active');
        shutterBtn.classList.add('active');

        // 4秒無操作で自動フェードアウト
        uiTimer = setTimeout(() => {
            fadeOutUI();
        }, 4000);
    }

    function fadeOutUI() {
        poseBtn.classList.remove('active');
        shutterBtn.classList.remove('active');
    }

    // AR起動検知
    viewer.addEventListener('ar-status', (event) => {
        if (event.detail.status === 'session-started') {
            isManualHidden = false;
            overlayUI.style.display = 'block';
            wakeUpUI();
        } else if (event.detail.status === 'session-ended') {
            overlayUI.style.display = 'none';
            fadeOutUI();
        }
    });

    // ─── 画面タッチ・スワイプ監視 ───
    window.addEventListener('touchstart', (event) => {
        // もし手動でUIを隠していたなら、画面のどこかをタップした瞬間に復活させる
        if (isManualHidden) {
            isManualHidden = false;
            wakeUpUI();
            return;
        }

        // 右上の「✕」ボタンを避ける
        if (event.touches[0].clientX > window.innerWidth * 0.8 && event.touches[0].clientY < 60) {
            return; 
        }
        wakeUpUI();
    }, { passive: true });

    window.addEventListener('touchmove', () => {
        wakeUpUI();
    }, { passive: true });


    // ─── ボタン単体のタッチ処理 ───

    // ポーズ切り替え
    poseBtn.addEventListener('touchstart', (event) => {
        event.preventDefault();
        event.stopPropagation(); 
        triggerNextAnimation();
        wakeUpUI(); 
    }, { passive: false });

    // 【重要】シャッターボタン（UIを完全に消し去る機能）
    shutterBtn.addEventListener('touchstart', (event) => {
        event.preventDefault();
        event.stopPropagation(); 
        
        // フラグを立ててUIを強制非表示にする
        isManualHidden = true;
        fadeOutUI();
        if (uiTimer) clearTimeout(uiTimer);

        // ※ このボタンが押された後は、ユーザーがスマホの標準機能で自由に
        // スクリーンショットや画面録画を行います。
        // 撮影が終わって画面をポンとタップすれば、上の touchstart イベントでUIが復活します。
    }, { passive: false });

</script>

</body>
</html>
