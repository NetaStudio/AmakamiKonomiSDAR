<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SD甘狼このみＡＲ</title>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            font-family: sans-serif; 
            user-select: none;
        }
        model-viewer { 
            width: 100vw; 
            height: 100vh; 
            background-color: #f0f0f0; 
        }
        
        /* ボタンの共通スタイル */
        .ar-ui-btn {
            position: absolute;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            border: 2px solid rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            z-index: 9999;
            transition: opacity 0.3s ease; /* ふわっと消える・現れる */
            opacity: 1; /* 最初は表示状態 */
            pointer-events: auto;
        }

        /* ダブルタップでこのクラスがつくと、完全に消えてタップも効かなくなります */
        .ar-ui-btn.hide-ui {
            opacity: 0 !important;
            pointer-events: none !important;
        }

        /* 左上：AR起動ボタン（これはAR起動前のみ使用） */
        #ar-button {
            position: absolute; 
            top: 20px;          
            left: 20px;         
            padding: 12px 24px; 
            background-color: #fff; 
            border-radius: 25px;
            border: 2px solid #ccc; 
            font-weight: bold; 
            z-index: 999;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        /* 【左下配置】ポーズ切り替えボタン */
        #action-button {
            bottom: 40px;
            left: 20px;
            padding: 14px 24px;
            background-color: rgba(0, 0, 0, 0.75);
            color: #fff;
            font-size: 15px;
        }

        /* 【右下配置】UIを隠すための案内用ボタン（画面のどこをダブルタップしても隠せますが、分かりやすさのため配置） */
        #shutter-button {
            bottom: 40px;
            right: 20px;
            padding: 14px 24px;
            background-color: #fff;
            color: #333;
            font-size: 15px;
        }

        #action-button:active { background-color: rgba(0,0,0,0.9); }
        #shutter-button:active { background-color: #ddd; }
    </style>
</head>
<body>

<model-viewer
    id="character-viewer"
    src="./konomi.glb"
    ios-src="./konomi.usdz" 
    alt="SD甘狼このみ"
    ar
    ar-modes="webxr scene-viewer quick-look" 
    camera-controls
    autoplay
    shadow-intensity="1"
>
    <button slot="ar-button" id="ar-button">AR撮影</button>

    <button slot="hotspot-action" id="action-button" class="ar-ui-btn">ポーズ切り替え</button>

    <button slot="hotspot-shutter" id="shutter-button" class="ar-ui-btn">👁 ボタンを隠す</button>
</model-viewer>

<script>
    const viewer = document.querySelector('#character-viewer');
    const actionBtn = document.querySelector('#action-button');
    const shutterBtn = document.querySelector('#shutter-button');
    
    let realIdleName = "";
    let realReactionAnims = [];
    let currentTrackIndex = 0; 
    let isReacting = false;     
    let uiHidden = false; // UIが隠れているかどうかのフラグ

    // 3Dモデル読み込み完了時の自動解析
    viewer.addEventListener('load', () => {
        const available = viewer.availableAnimations;
        const idleTrack = available.find(name => name.toLowerCase().includes('idle'));
        realIdleName = idleTrack || available[0];
        realReactionAnims = available.filter(name => name !== realIdleName);

        if (realIdleName) {
            viewer.animationName = realIdleName;
            viewer.play();
        }
    });

    // モーション切り替えの処理
    function triggerNextAnimation() {
        if (realReactionAnims.length === 0 || isReacting) return; 
        isReacting = true; 

        const chosenAnim = realReactionAnims[currentTrackIndex];
        viewer.animationName = chosenAnim;
        viewer.play();

        currentTrackIndex = (currentTrackIndex + 1) % realReactionAnims.length;

        setTimeout(() => {
            if (realIdleName) {
                viewer.animationName = realIdleName;
                viewer.play();
            }
            isReacting = false; 
        }, 2500);
    }

    // ─── UI表示・非表示を完全に切り替える関数（トグル方式） ───
    function toggleUI() {
        uiHidden = !uiHidden;
        if (uiHidden) {
            actionBtn.classList.add('hide-ui');
            shutterBtn.classList.add('hide-ui');
        } else {
            actionBtn.classList.remove('hide-ui');
            shutterBtn.classList.remove('hide-ui');
        }
    }

    // ─── ボタン単体のタップ処理（WebXRの移動枠の暴発をガード） ───

    // 左下：ポーズ切り替えボタンが押された時
    actionBtn.addEventListener('touchstart', (event) => {
        event.stopPropagation(); // 移動枠が出るシステムへイベントを絶対に渡さない
        triggerNextAnimation();
    }, { passive: true });

    actionBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        triggerNextAnimation();
    });

    // 右下：「ボタンを隠す」が押された時（一発で非表示モードへ）
    shutterBtn.addEventListener('touchstart', (event) => {
        event.stopPropagation();
        toggleUI();
    }, { passive: true });

    shutterBtn.addEventListener('click', (event) => {
        event.stopPropagation();
        toggleUI();
    });

    // ─── 【重要】AR空間（画面全体）でのダブルタップによるUI復活・非表示処理 ───
    let lastTapTime = 0;
    
    // Android WebXR環境の背景ダブルタップを検出
    viewer.addEventListener('ar-status', (event) => {
        if (event.detail.status === 'session-started') {
            const xrSession = viewer.xrSession; 
            if (xrSession) {
                xrSession.addEventListener('select', (e) => {
                    const currentTime = new Date().getTime();
                    const tapLength = currentTime - lastTapTime;
                    
                    // 0.3秒以内に連続で画面が叩かれたら「ダブルタップ」と判定
                    if (tapLength < 300 && tapLength > 0) {
                        toggleUI(); // UIを切り替える
                    }
                    lastTapTime = currentTime;
                });
            }
        }
    });

    // 通常のブラウザ画面テスト用のダブルクリックイベント
    viewer.addEventListener('dblclick', () => {
        toggleUI();
    });
</script>

</body>
</html>
